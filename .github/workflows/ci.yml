name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          JUDGE0_API_URL: ${{ secrets.JUDGE0_API_URL }}
          JUDGE0_API_KEY: ${{ secrets.JUDGE0_API_KEY }}
          PUBLIC_SITE_URL: https://belajar-cpp.varnimyr.my.id

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          JUDGE0_API_URL: ${{ secrets.JUDGE0_API_URL }}
          JUDGE0_API_KEY: ${{ secrets.JUDGE0_API_KEY }}
          PUBLIC_SITE_URL: https://belajar-cpp.varnimyr.my.id

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
