<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      :root {
        --bg: #f8fafc;
        --border: #e2e8f0;
        --card-bg: #ffffff;
        --card-border: #e2e8f0;
        --text-main: #1e293b;
        --text-sub: #64748b;
        --inner-bg: #f1f5f9;
        --inner-border: #cbd5e1;
        --value-text: #1e293b;
        --shadow: rgba(0,0,0,0.07);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --border: #1e293b;
          --card-bg: #1e293b;
          --card-border: #334155;
          --text-main: #f1f5f9;
          --text-sub: #94a3b8;
          --inner-bg: #0f172a;
          --inner-border: #475569;
          --value-text: #f1f5f9;
          --shadow: rgba(0,0,0,0.4);
        }
      }
    </style>
    <filter id="vb-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="var(--shadow)"/>
    </filter>
    <!-- Blue accent -->
    <linearGradient id="vb-g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Green accent -->
    <linearGradient id="vb-g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Purple accent -->
    <linearGradient id="vb-g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="200" rx="14" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>

  <!-- Label top -->
  <text x="340" y="26" text-anchor="middle" fill="var(--text-sub)" font-size="11" font-weight="600" letter-spacing="0.5">VARIABEL = KOTAK PENYIMPANAN BERLABEL</text>

  <!-- === BOX 1: umur (int) === -->
  <g filter="url(#vb-shadow)">
    <!-- Card -->
    <rect x="28" y="42" width="184" height="138" rx="12" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1.5"/>
    <!-- Top accent bar -->
    <rect x="28" y="42" width="184" height="6" rx="0" fill="url(#vb-g1)" rx="12"/>
    <rect x="28" y="42" width="184" height="6" fill="url(#vb-g1)"/>
    <rect x="28" y="42" width="184" height="10" rx="6" fill="url(#vb-g1)"/>
    <rect x="28" y="48" width="184" height="6" fill="url(#vb-g1)"/>
  </g>
  <!-- Label name -->
  <text x="120" y="72" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700" font-family="'JetBrains Mono', monospace">umur</text>
  <!-- Inner box (value) -->
  <rect x="52" y="82" width="136" height="48" rx="8" fill="var(--inner-bg)" stroke="var(--inner-border)" stroke-width="1.5"/>
  <text x="120" y="113" text-anchor="middle" fill="var(--value-text)" font-size="22" font-weight="700" font-family="'JetBrains Mono', monospace">17</text>
  <!-- Type badge -->
  <rect x="68" y="144" width="104" height="24" rx="6" fill="#3b82f6" fill-opacity="0.12"/>
  <text x="120" y="161" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600" font-family="'JetBrains Mono', monospace">tipe: int</text>

  <!-- === BOX 2: nama (string) === -->
  <g filter="url(#vb-shadow)">
    <rect x="248" y="42" width="184" height="138" rx="12" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1.5"/>
    <rect x="248" y="42" width="184" height="10" rx="6" fill="url(#vb-g2)"/>
    <rect x="248" y="48" width="184" height="6" fill="url(#vb-g2)"/>
  </g>
  <text x="340" y="72" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700" font-family="'JetBrains Mono', monospace">nama</text>
  <rect x="272" y="82" width="136" height="48" rx="8" fill="var(--inner-bg)" stroke="var(--inner-border)" stroke-width="1.5"/>
  <text x="340" y="113" text-anchor="middle" fill="var(--value-text)" font-size="18" font-weight="700" font-family="'JetBrains Mono', monospace">"Budi"</text>
  <rect x="254" y="144" width="172" height="24" rx="6" fill="#10b981" fill-opacity="0.12"/>
  <text x="340" y="161" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600" font-family="'JetBrains Mono', monospace">tipe: string</text>

  <!-- === BOX 3: tinggi (double) === -->
  <g filter="url(#vb-shadow)">
    <rect x="468" y="42" width="184" height="138" rx="12" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1.5"/>
    <rect x="468" y="42" width="184" height="10" rx="6" fill="url(#vb-g3)"/>
    <rect x="468" y="48" width="184" height="6" fill="url(#vb-g3)"/>
  </g>
  <text x="560" y="72" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700" font-family="'JetBrains Mono', monospace">tinggi</text>
  <rect x="492" y="82" width="136" height="48" rx="8" fill="var(--inner-bg)" stroke="var(--inner-border)" stroke-width="1.5"/>
  <text x="560" y="113" text-anchor="middle" fill="var(--value-text)" font-size="20" font-weight="700" font-family="'JetBrains Mono', monospace">170.5</text>
  <rect x="490" y="144" width="140" height="24" rx="6" fill="#8b5cf6" fill-opacity="0.12"/>
  <text x="560" y="161" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="'JetBrains Mono', monospace">tipe: double</text>
</svg>
