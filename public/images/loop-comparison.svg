<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      :root {
        --bg: #f8fafc;
        --border: #e2e8f0;
        --card-bg: #ffffff;
        --shadow: rgba(0,0,0,0.08);
        --label: #64748b;
        --arrow: #94a3b8;
        --arrow-label: #94a3b8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --border: #1e293b;
          --card-bg: #1e293b;
          --shadow: rgba(0,0,0,0.4);
          --label: #64748b;
          --arrow: #475569;
          --arrow-label: #64748b;
        }
      }
    </style>
    <filter id="lc-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="var(--shadow)"/>
    </filter>
    <marker id="lc-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="var(--arrow)"/>
    </marker>

    <!-- Blue gradient for while loop boxes -->
    <linearGradient id="lc-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Purple gradient for for loop boxes -->
    <linearGradient id="lc-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Teal gradient for do-while loop boxes -->
    <linearGradient id="lc-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <!-- Amber gradient for diamonds -->
    <linearGradient id="lc-amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="780" height="340" rx="14" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>

  <!-- ===================== -->
  <!-- COLUMN 1: while loop  -->
  <!-- ===================== -->
  <!-- Column title -->
  <text x="130" y="26" text-anchor="middle" fill="var(--label)" font-size="10" font-weight="700" letter-spacing="0.8">WHILE LOOP</text>

  <!-- Init box -->
  <g filter="url(#lc-shadow)">
    <rect x="90" y="38" width="80" height="32" rx="7" fill="url(#lc-blue)"/>
  </g>
  <text x="130" y="59" text-anchor="middle" fill="white" font-size="12" font-weight="600">Init</text>

  <!-- Arrow: Init → Condition -->
  <line x1="130" y1="70" x2="130" y2="88" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>

  <!-- Condition diamond -->
  <g filter="url(#lc-shadow)">
    <polygon points="130,92 170,114 130,136 90,114" fill="url(#lc-amber)"/>
  </g>
  <text x="130" y="118" text-anchor="middle" fill="white" font-size="11" font-weight="600">Cond?</text>

  <!-- Arrow: Condition → Body (true, down) -->
  <line x1="130" y1="136" x2="130" y2="154" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>
  <text x="138" y="149" fill="var(--arrow-label)" font-size="9">true</text>

  <!-- Body box -->
  <g filter="url(#lc-shadow)">
    <rect x="90" y="158" width="80" height="32" rx="7" fill="url(#lc-blue)"/>
  </g>
  <text x="130" y="179" text-anchor="middle" fill="white" font-size="12" font-weight="600">Body</text>

  <!-- Back arrow: Body → Condition (left side loop) -->
  <polyline points="90,174 62,174 62,114 90,114" fill="none" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>

  <!-- False exit arrow: Condition → Exit (right) -->
  <line x1="170" y1="114" x2="200" y2="114" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>
  <text x="172" y="108" fill="var(--arrow-label)" font-size="9">false</text>
  <!-- Exit marker -->
  <rect x="200" y="104" width="34" height="20" rx="5" fill="none" stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="217" y="118" text-anchor="middle" fill="var(--label)" font-size="9">exit</text>

  <!-- Code label -->
  <rect x="50" y="224" width="168" height="22" rx="5" fill="none" stroke="var(--border)" stroke-width="1"/>
  <text x="134" y="239" text-anchor="middle" fill="var(--label)" font-size="10" font-family="monospace">while (cond) &#123; body &#125;</text>

  <!-- ==================== -->
  <!-- COLUMN 2: for loop   -->
  <!-- ==================== -->
  <!-- Column title -->
  <text x="390" y="26" text-anchor="middle" fill="var(--label)" font-size="10" font-weight="700" letter-spacing="0.8">FOR LOOP</text>

  <!-- Init box -->
  <g filter="url(#lc-shadow)">
    <rect x="350" y="38" width="80" height="32" rx="7" fill="url(#lc-purple)"/>
  </g>
  <text x="390" y="59" text-anchor="middle" fill="white" font-size="12" font-weight="600">Init</text>

  <!-- Arrow: Init → Condition -->
  <line x1="390" y1="70" x2="390" y2="88" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>

  <!-- Condition diamond -->
  <g filter="url(#lc-shadow)">
    <polygon points="390,92 430,114 390,136 350,114" fill="url(#lc-amber)"/>
  </g>
  <text x="390" y="118" text-anchor="middle" fill="white" font-size="11" font-weight="600">Cond?</text>

  <!-- Arrow: Condition → Body (true, down) -->
  <line x1="390" y1="136" x2="390" y2="154" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>
  <text x="398" y="149" fill="var(--arrow-label)" font-size="9">true</text>

  <!-- Body box -->
  <g filter="url(#lc-shadow)">
    <rect x="350" y="158" width="80" height="32" rx="7" fill="url(#lc-purple)"/>
  </g>
  <text x="390" y="179" text-anchor="middle" fill="white" font-size="12" font-weight="600">Body</text>

  <!-- Arrow: Body → Update -->
  <line x1="390" y1="190" x2="390" y2="208" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>

  <!-- Update box -->
  <g filter="url(#lc-shadow)">
    <rect x="350" y="212" width="80" height="30" rx="7" fill="url(#lc-purple)"/>
  </g>
  <text x="390" y="231" text-anchor="middle" fill="white" font-size="12" font-weight="600">Update</text>

  <!-- Back arrow: Update → Condition (left side loop) -->
  <polyline points="350,227 322,227 322,114 350,114" fill="none" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>

  <!-- False exit arrow: Condition → Exit (right) -->
  <line x1="430" y1="114" x2="460" y2="114" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>
  <text x="432" y="108" fill="var(--arrow-label)" font-size="9">false</text>
  <rect x="460" y="104" width="34" height="20" rx="5" fill="none" stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="477" y="118" text-anchor="middle" fill="var(--label)" font-size="9">exit</text>

  <!-- Code label -->
  <rect x="295" y="270" width="188" height="22" rx="5" fill="none" stroke="var(--border)" stroke-width="1"/>
  <text x="389" y="285" text-anchor="middle" fill="var(--label)" font-size="10" font-family="monospace">for (init; cond; update)</text>

  <!-- ========================= -->
  <!-- COLUMN 3: do-while loop   -->
  <!-- ========================= -->
  <!-- Column title -->
  <text x="655" y="26" text-anchor="middle" fill="var(--label)" font-size="10" font-weight="700" letter-spacing="0.8">DO-WHILE LOOP</text>

  <!-- "Runs at least once!" note -->
  <rect x="565" y="36" width="184" height="20" rx="5" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="657" y="50" text-anchor="middle" fill="#92400e" font-size="9" font-weight="600">&#9888; Runs at least once!</text>

  <!-- Body box (executes first) -->
  <g filter="url(#lc-shadow)">
    <rect x="615" y="64" width="80" height="32" rx="7" fill="url(#lc-teal)"/>
  </g>
  <text x="655" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="600">Body</text>

  <!-- Arrow: Body → Condition -->
  <line x1="655" y1="96" x2="655" y2="114" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>

  <!-- Condition diamond -->
  <g filter="url(#lc-shadow)">
    <polygon points="655,118 695,140 655,162 615,140" fill="url(#lc-amber)"/>
  </g>
  <text x="655" y="144" text-anchor="middle" fill="white" font-size="11" font-weight="600">Cond?</text>

  <!-- Back arrow: Condition → Body (true, left side loop) -->
  <polyline points="615,140 587,140 587,80 615,80" fill="none" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>
  <text x="572" y="110" text-anchor="middle" fill="var(--arrow-label)" font-size="9">true</text>

  <!-- False exit arrow: Condition → Exit (right) -->
  <line x1="695" y1="140" x2="725" y2="140" stroke="var(--arrow)" stroke-width="1.8" marker-end="url(#lc-arrow)"/>
  <text x="697" y="134" fill="var(--arrow-label)" font-size="9">false</text>
  <rect x="725" y="130" width="34" height="20" rx="5" fill="none" stroke="var(--arrow)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="742" y="144" text-anchor="middle" fill="var(--label)" font-size="9">exit</text>

  <!-- Code label -->
  <rect x="555" y="196" width="198" height="22" rx="5" fill="none" stroke="var(--border)" stroke-width="1"/>
  <text x="654" y="211" text-anchor="middle" fill="var(--label)" font-size="10" font-family="monospace">do &#123; body &#125; while (cond);</text>

  <!-- Vertical dividers between columns -->
  <line x1="260" y1="16" x2="260" y2="324" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="520" y1="16" x2="520" y2="324" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
