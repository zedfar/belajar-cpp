<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      :root {
        --bg: #f8fafc;
        --border: #e2e8f0;
        --card-bg: #ffffff;
        --card-border: #e2e8f0;
        --text-main: #1e293b;
        --text-sub: #64748b;
        --arrow-color: #94a3b8;
        --op-bg: #f1f5f9;
        --op-border: #cbd5e1;
        --shadow: rgba(0,0,0,0.07);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --border: #1e293b;
          --card-bg: #1e293b;
          --card-border: #334155;
          --text-main: #f1f5f9;
          --text-sub: #94a3b8;
          --arrow-color: #475569;
          --op-bg: #0f172a;
          --op-border: #475569;
          --shadow: rgba(0,0,0,0.4);
        }
      }
    </style>
    <filter id="io-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="var(--shadow)"/>
    </filter>
    <marker id="io-arrow-cin" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
    <marker id="io-arrow-cout" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <!-- Cyan gradient for cin (keyboard side) -->
    <linearGradient id="io-g-kb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Slate for program -->
    <linearGradient id="io-g-prog" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Green for cout (screen side) -->
    <linearGradient id="io-g-scr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="200" rx="14" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>

  <!-- Label top -->
  <text x="410" y="26" text-anchor="middle" fill="var(--text-sub)" font-size="11" font-weight="600" letter-spacing="0.5">ALUR INPUT / OUTPUT C++</text>

  <!-- === Keyboard Box === -->
  <g filter="url(#io-shadow)">
    <rect x="22" y="44" width="148" height="112" rx="12" fill="url(#io-g-kb)"/>
  </g>
  <!-- Keyboard icon -->
  <g transform="translate(96, 84)">
    <rect x="-22" y="-12" width="44" height="28" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- key rows -->
    <g fill="rgba(255,255,255,0.8)" font-size="5" font-family="monospace">
      <rect x="-16" y="-7" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="-8" y="-7" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="0" y="-7" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="8" y="-7" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="-12" y="1" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="-4" y="1" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="4" y="1" width="5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="-8" y="9" width="16" height="4" rx="1" fill="rgba(255,255,255,0.5)"/>
    </g>
  </g>
  <text x="96" y="138" text-anchor="middle" fill="white" font-size="13" font-weight="700">Keyboard</text>
  <text x="96" y="153" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="10.5">User mengetik</text>

  <!-- cin >> arrow + label -->
  <line x1="173" y1="100" x2="238" y2="100" stroke="#06b6d4" stroke-width="2.5" marker-end="url(#io-arrow-cin)"/>
  <!-- operator pill -->
  <rect x="185" y="83" width="62" height="28" rx="8" fill="var(--card-bg)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="216" y="102" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">cin &gt;&gt;</text>
  <!-- label -->
  <text x="216" y="73" text-anchor="middle" fill="#06b6d4" font-size="9.5" font-weight="600">ambil dari keyboard</text>

  <!-- === Program Box === -->
  <g filter="url(#io-shadow)">
    <rect x="242" y="44" width="336" height="112" rx="12" fill="url(#io-g-prog)"/>
  </g>
  <!-- Code-style content -->
  <text x="410" y="83" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="'JetBrains Mono', monospace">// program C++ kamu</text>
  <rect x="272" y="90" width="276" height="34" rx="7" fill="rgba(0,0,0,0.2)"/>
  <text x="410" y="113" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12" font-weight="600" font-family="'JetBrains Mono', monospace">cin &gt;&gt; nama;   cout &lt;&lt; nama;</text>
  <text x="410" y="145" text-anchor="middle" fill="white" font-size="14" font-weight="700">Program C++</text>
  <text x="410" y="153" text-anchor="middle" fill="rgba(255,255,255,0)" font-size="0">spacer</text>

  <!-- cout << arrow + label -->
  <line x1="581" y1="100" x2="646" y2="100" stroke="#10b981" stroke-width="2.5" marker-end="url(#io-arrow-cout)"/>
  <!-- operator pill -->
  <rect x="581" y="83" width="66" height="28" rx="8" fill="var(--card-bg)" stroke="#10b981" stroke-width="1.5"/>
  <text x="614" y="102" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">cout &lt;&lt;</text>
  <!-- label -->
  <text x="614" y="73" text-anchor="middle" fill="#10b981" font-size="9.5" font-weight="600">kirim ke layar</text>

  <!-- === Screen/Monitor Box === -->
  <g filter="url(#io-shadow)">
    <rect x="650" y="44" width="148" height="112" rx="12" fill="url(#io-g-scr)"/>
  </g>
  <!-- Monitor icon -->
  <g transform="translate(724, 84)">
    <rect x="-20" y="-14" width="40" height="28" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <line x1="0" y1="14" x2="0" y2="20" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="20" x2="8" y2="20" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="-14" y="-3" fill="rgba(255,255,255,0.9)" font-size="8" font-family="monospace">Halo!</text>
    <line x1="-14" y1="3" x2="6" y2="3" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-14" y1="7" x2="2" y2="7" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="724" y="138" text-anchor="middle" fill="white" font-size="13" font-weight="700">Layar</text>
  <text x="724" y="153" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="10.5">Output tampil</text>
</svg>
